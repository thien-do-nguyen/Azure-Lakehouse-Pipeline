name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Lint
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          ruff check src tests
          mypy src

      - name: Test
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest

      - name: Build package
        run: python -m pip wheel --wheel-dir dist .

      - name: Build Docker image
        run: docker build -t ecommerce-pipeline:ci .

  cdc-lifecycle-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: python -m pip install ".[dev]"

      - name: CDC restart and replay lifecycle
        env:
          RUN_CDC_E2E: "1"
          PYTHONPATH: ${{ github.workspace }}/src
          SPARK_LOCAL_IP: 127.0.0.1
          SPARK_LOCAL_HOSTNAME: localhost
        run: pytest -m e2e --no-cov -v
